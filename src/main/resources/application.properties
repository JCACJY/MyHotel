server.port=8090

spring.application.name=MyHotel

spring.datasource.url=jdbc:h2:mem:myhotel;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.jpa.hibernate.ddl-auto=none

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.banner=false

myhotel.room-number.min-floor=8
myhotel.room-number.max-floor=19
myhotel.room-number.max-room-per-floor=20
